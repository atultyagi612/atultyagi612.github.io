    <style>
        body {
            font-family: 'Yusei Magic', sans-serif;
            background-color: black;
            color: white;
        }

        .rubberBand {
            display: inline-block;
            font-size: 60px;
            font-weight: bold;
            padding: 0px 0px;
            margin: -3px;
            cursor: default;
        }

        /* span.rubberBand:not(:hover) {
            animation: rubberBand 1s , always1 5s infinite 1s , color-trans 30s infinite 1s;
        } */

        @keyframes rubberBand {

            from {
                color: rgb(9, 64, 78);
                transform: scale3d(1, 1, 1);
            }

            30% {
                transform: scale3d(1.25, 0.75, 1);
            }

            40% {
                transform: scale3d(0.75, 1.25, 1);
            }

            50% {
                color: rgb(62, 72, 216);
                transform: scale3d(1.15, 0.85, 1);
            }

            65% {
                transform: scale3d(0.95, 1.05, 1);
            }

            75% {
                transform: scale3d(1.05, 0.95, 1);
            }

            to {
                transform: scale3d(1, 1, 1);
            }
        }

        @keyframes always1 {

            from {

                transform: scale3d(1, 1, 1);
            }

            30% {
                transform: scale3d(1.1, 0.85, 1);
            }

            40% {
                transform: scale3d(0.85, 1.1, 1);
            }

            50% {

                transform: scale3d(1.15, 0.85, 1);
            }

            65% {
                transform: scale3d(0.95, 1.05, 1);
            }

            75% {
                transform: scale3d(1.05, 0.95, 1);
            }

            to {
                transform: scale3d(1, 1, 1);
            }
        }

        @keyframes color-trans {
            from {
                color: turquoise;
            }

            10% {
                color: rgb(115, 128, 0);
            }

            20% {
                color: rgb(0, 2, 128);
            }

            30% {
                color: rgb(0, 45, 128);
            }

            40% {
                color: rgb(60, 0, 128);
            }

            50% {
                color: rgb(230, 21, 143);
            }

            60% {
                color: rgb(4, 58, 58);
            }

            70% {
                color: rgb(65, 155, 23);
            }

            80% {
                color: teal;
            }

            90% {
                color: rgb(172, 125, 71);
            }

            to {
                color: turquoise;
            }
        }

    <script>
        let elemnt = () => {
         
            let element = document.getElementsByClassName('rubberBand')

            for (let i = 0; i < element.length; i++) {
                element[i].style.animation = `rubberBand 1s, always1 5s infinite 1s, color-trans 30s infinite 1s`;
                element[i].addEventListener('mouseover', () => {
                    if (element[i].style.animation) {
                        element[i].style.animation = '';
                    }
                    else {
                        element[i].style.animation = `rubberBand 1s, always1 5s infinite 1s, color-trans 30s infinite 1s`;
                    }

                }, false);
                element[i].addEventListener('mouseout', () => {
                        element[i].style.animation = `rubberBand 1s, always1 5s infinite 1s, color-trans 30s infinite 1s`;
                }, false);
                element[i].addEventListener('click', () => {
                        element[i].style.animation = `rubberBand 1s, always1 5s infinite 1s, color-trans 30s infinite 1s`;
                }, false);

            }
        }
        elemnt();
    </script>
