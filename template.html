<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .Progress {
    display: flex;
    height: 8px;
    overflow: hidden;
    background-color: var(--color-auto-gray-2);
    border-radius: 6px;
    outline: 1px solid transparent;
    width: 307px;

}
        .Progress-item {
    outline: 2px solid transparent;
}

    </style>
</head>
<body>
<div>

    <span class="Progress">
        <span itemprop="keywords" aria-label="HTML 69.2" style="background-color: #e34c26;width: 69.2%;" class="Progress-item "></span>
        <span itemprop="keywords" aria-label="CSS 25.7" style="background-color: #563d7c;width: 25.7%;" class="Progress-item "></span>
        <span itemprop="keywords" aria-label="JavaScript 5.1" style="background-color: #f1e05a;width: 5.1%;" class="Progress-item "></span>
    </span>
    <ul style="text-decoration: none; list-style: none;">
        
        <li>
            <svg height="10" width="15">
                <circle cx="5" cy="5" r="5" stroke="black" stroke-width="0" fill="red" />
              </svg>
              <span style="font-weight: bold;">HTML</span>
              <span style="font-style: italic;">15%</span>
        </li>
    </ul>
</div>
</body>
</html>
